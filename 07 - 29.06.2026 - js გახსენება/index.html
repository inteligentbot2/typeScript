<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JS გახსენება</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, Helvetica, sans-serif;
        background: #f4f6f9;
        display: flex;
        justify-content: center;
        flex-direction: column;
        padding: 40px;
        gap: 30px;
      }

      .container {
        width: 100%;
        max-width: 500px;
        background: #fff;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      }

      h2,
      h3 {
        text-align: center;
        color: #333;
        margin-bottom: 20px;
      }

      label {
        display: block;
        margin-top: 15px;
        margin-bottom: 6px;
        font-weight: bold;
        color: #555;
      }

      input,
      select {
        width: 100%;
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 8px;
        font-size: 15px;
        transition: 0.3s;
      }

      input:focus,
      select:focus {
        border-color: #4caf50;
        outline: none;
        box-shadow: 0 0 5px rgba(76, 175, 80, 0.3);
      }

      button {
        width: 100%;
        margin-top: 25px;
        padding: 12px;
        background: #4caf50;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 17px;
        cursor: pointer;
        transition: 0.3s;
      }

      button:hover {
        background: #388e3c;
      }

      pre {
        margin-top: 20px;
        background: #f7f7f7;
        padding: 15px;
        border-radius: 8px;
        border-left: 4px solid #4caf50;
        white-space: pre-wrap;
        word-wrap: break-word;
      }
    </style>
    <script src="./script.js" defer></script>
  </head>
  <body>
    <div id="person"></div>
    <h2>მომხმარებლის ინფორმაცია</h2>

    <form id="userForm">
      <label>სახელი</label>
      <input type="text" id="firstName" required />

      <label>გვარი</label>
      <input type="text" id="lastName" required />

      <label>Email</label>
      <input type="email" id="email" required />

      <label>ტელეფონი</label>
      <input type="tel" id="phone" />

      <label>ასაკი</label>
      <input type="number" id="age" />

      <label>სქესი</label>
      <select id="gender">
        <option value="">აირჩიეთ</option>
        <option value="male">მამრობითი</option>
        <option value="female">მდედრობითი</option>
      </select>

      <button type="submit">შენახვა</button>
    </form>

    <h3>შედეგი</h3>
    <pre id="result"></pre>
  </body>
</html>
